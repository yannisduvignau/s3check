name: Build Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            artifact_name: Object-Storage-Access-Verifier.exe
            asset_name: object-storage-access-verifier-windows.exe
          # Linux
          - os: ubuntu-latest
            artifact_name: Object-Storage-Access-Verifier
            asset_name: object-storage-access-verifier-linux
          # Mac
          - os: macos-latest
            artifact_name: Object-Storage-Access-Verifier
            asset_name: object-storage-access-verifier-macos

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        pip install .
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --collect-all boto3 --collect-all botocore --hidden-import=s3check.cli --hidden-import=s3check.client --hidden-import=s3check.config --hidden-import=s3check.providers --hidden-import=s3check.ui --name "Object-Storage-Access-Verifier" -c src/s3check/cli.py
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/${{ matrix.artifact_name }}